; ============================================================================
;  hackeroo — RP2350 (Raspberry Pi Pico 2) hardware-hacking multitool
; ============================================================================
;  A serial command console (USB CDC) exposing pluggable HW-hacking modules:
;  uart (autobaud), i2c, spi (flash dump), siggen, pio, jtag (pin scan), glitch.
;
;  RP2350 support comes from the community platform fork + Earle Philhower core.
; ----------------------------------------------------------------------------

[platformio]
default_envs = pico2
src_dir = src

; ---- shared settings -------------------------------------------------------
[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower

; USB CDC serial is our console. Give the device a recognisable identity.
build_flags =
    -Os
    -DUSBD_MANUFACTURER=\"hackeroo\"
    -DUSBD_PRODUCT=\"hackeroo-rp2350\"
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS
    -DSERIALUSB_PID=0x000a

; Fast host<->device link for bulk dumps.
monitor_speed = 115200
monitor_echo = yes

; ---- Raspberry Pi Pico 2 (RP2350A, ARM Cortex-M33) -------------------------
[env:pico2]
board = rpipico2
board_build.filesystem_size = 0.5m
; Upload by copying the UF2 to the mounted BOOTSEL drive (most robust here).
upload_protocol = picotool

; ---- Same board, but flashed/debugged over SWD with a probe -----------------
[env:pico2_swd]
board = rpipico2
board_build.filesystem_size = 0.5m
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
